<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I'm Sorry 💕</title>
<link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:    #ff4d7e;
    --blush:   #ff85a1;
    --deep:    #c0143c;
    --soft:    #ffe0eb;
    --glow:    #ff2d6b;
    --cream:   #fff5f8;
    --text:    #6b1a35;
  }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: radial-gradient(ellipse at 20% 30%, #ffe4ec 0%, #ffd0df 40%, #ffb8ce 100%);
    font-family: 'Lora', serif;
    overflow-x: hidden;
    position: relative;
  }

  /* ── Ambient floating hearts ── */
  .ambient {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 0;
  }
  .ambient span {
    position: absolute;
    bottom: -60px;
    font-size: 1.4rem;
    opacity: 0;
    animation: floatUp linear infinite;
  }
  .ambient span:nth-child(1)  { left:5%;   animation-duration:8s;  animation-delay:0s;   font-size:1rem; }
  .ambient span:nth-child(2)  { left:12%;  animation-duration:11s; animation-delay:2s; }
  .ambient span:nth-child(3)  { left:22%;  animation-duration:9s;  animation-delay:4s;   font-size:1.8rem; }
  .ambient span:nth-child(4)  { left:33%;  animation-duration:13s; animation-delay:1s;   font-size:0.9rem; }
  .ambient span:nth-child(5)  { left:45%;  animation-duration:10s; animation-delay:3s; }
  .ambient span:nth-child(6)  { left:57%;  animation-duration:7s;  animation-delay:5s;   font-size:2rem; }
  .ambient span:nth-child(7)  { left:68%;  animation-duration:12s; animation-delay:0.5s; font-size:1.1rem; }
  .ambient span:nth-child(8)  { left:78%;  animation-duration:9s;  animation-delay:2.5s; }
  .ambient span:nth-child(9)  { left:87%;  animation-duration:11s; animation-delay:4.5s; font-size:1.6rem; }
  .ambient span:nth-child(10) { left:95%;  animation-duration:8s;  animation-delay:1.5s; font-size:0.8rem; }

  @keyframes floatUp {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.4; }
    100% { transform: translateY(-110vh) rotate(30deg); opacity: 0; }
  }

  /* ── Card ── */
  .card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.72);
    backdrop-filter: blur(18px);
    border: 1.5px solid rgba(255,100,140,0.3);
    border-radius: 28px;
    padding: 52px 44px 48px;
    max-width: 520px;
    width: 92%;
    text-align: center;
    box-shadow:
      0 8px 40px rgba(255,77,126,0.18),
      0 2px 8px rgba(255,77,126,0.10),
      inset 0 1px 0 rgba(255,255,255,0.8);
    animation: cardIn 0.9s cubic-bezier(.22,1,.36,1) both;
  }

  @keyframes cardIn {
    from { opacity:0; transform: translateY(40px) scale(0.96); }
    to   { opacity:1; transform: translateY(0)    scale(1); }
  }

  /* ── Glow heart header ── */
  .heart-header {
    font-size: 3.6rem;
    line-height: 1;
    margin-bottom: 8px;
    display: block;
    filter: drop-shadow(0 0 12px rgba(255,77,126,0.7));
    animation: heartbeat 1.4s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1); }
    15%      { transform: scale(1.18); }
    30%      { transform: scale(1); }
    45%      { transform: scale(1.12); }
  }

  h1 {
    font-family: 'Dancing Script', cursive;
    font-size: clamp(2rem, 6vw, 2.8rem);
    font-weight: 700;
    color: var(--deep);
    line-height: 1.2;
    margin-bottom: 6px;
    text-shadow: 0 2px 12px rgba(192,20,60,0.18);
  }

  .subtitle {
    font-size: 0.95rem;
    color: var(--blush);
    font-style: italic;
    margin-bottom: 32px;
    letter-spacing: 0.02em;
  }

  /* ── Typewriter ── */
  .typewriter-wrap {
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 36px;
  }
  .typewriter {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: clamp(1rem, 3.5vw, 1.15rem);
    color: var(--text);
    line-height: 1.6;
    max-width: 380px;
  }
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1.1em;
    background: var(--rose);
    margin-left: 2px;
    vertical-align: text-bottom;
    animation: blink 0.75s step-end infinite;
  }
  @keyframes blink { 50% { opacity:0; } }

  /* ── Forgive button ── */
  .btn-wrap {
    position: relative;
    display: inline-block;
  }
  .btn-forgive {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 18px 44px;
    font-family: 'Dancing Script', cursive;
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
    background: linear-gradient(135deg, var(--rose) 0%, var(--deep) 100%);
    border: none;
    border-radius: 60px;
    cursor: pointer;
    box-shadow:
      0 6px 28px rgba(255,77,126,0.45),
      0 0 0 0 rgba(255,77,126,0);
    transition: transform 0.18s ease, box-shadow 0.18s ease;
    overflow: hidden;
    animation: btnPulse 2.5s ease-in-out infinite 1.5s;
    letter-spacing: 0.01em;
    white-space: nowrap;
  }
  .btn-forgive::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 60%);
    border-radius: inherit;
  }
  .btn-forgive:hover {
    transform: translateY(-3px) scale(1.04);
    box-shadow: 0 12px 36px rgba(255,77,126,0.55), 0 0 0 8px rgba(255,77,126,0.12);
  }
  .btn-forgive:active {
    transform: scale(0.97);
  }
  @keyframes btnPulse {
    0%,100% { box-shadow: 0 6px 28px rgba(255,77,126,0.45), 0 0 0 0   rgba(255,77,126,0.3); }
    50%      { box-shadow: 0 6px 28px rgba(255,77,126,0.45), 0 0 0 14px rgba(255,77,126,0); }
  }
  .btn-forgive.thanked {
    background: linear-gradient(135deg, #ff6b9d 0%, #c0143c 100%);
    animation: none;
    pointer-events: none;
  }

  /* ── Muahh message ── */
  .muahh {
    margin-top: 28px;
    font-family: 'Dancing Script', cursive;
    font-size: clamp(1.3rem, 5vw, 1.8rem);
    font-weight: 700;
    color: var(--deep);
    letter-spacing: 0.04em;
    opacity: 0;
    transform: scale(0.7) translateY(10px);
    transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.22,1,.36,1);
    pointer-events: none;
    min-height: 2.2rem;
    text-shadow: 0 2px 16px rgba(255,77,126,0.3);
  }
  .muahh.show {
    opacity: 1;
    transform: scale(1) translateY(0);
  }

  /* ── Floating kisses (dynamic) ── */
  .kiss-float {
    position: fixed;
    font-size: 2rem;
    pointer-events: none;
    z-index: 999;
    animation: kissRise 2.2s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes kissRise {
    0%   { opacity:1; transform: translateY(0) scale(0.5) rotate(0deg); }
    60%  { opacity:1; transform: translateY(-180px) scale(1.3) rotate(-15deg); }
    100% { opacity:0; transform: translateY(-320px) scale(0.8) rotate(20deg); }
  }

  /* ── Heart burst particles ── */
  .burst-heart {
    position: fixed;
    font-size: 1.4rem;
    pointer-events: none;
    z-index: 998;
    animation: burstOut 1.2s cubic-bezier(.22,1,.36,1) forwards;
  }
  @keyframes burstOut {
    0%   { opacity:1; transform: translate(0,0) scale(0.5); }
    60%  { opacity:1; }
    100% { opacity:0; transform: translate(var(--dx), var(--dy)) scale(0.3); }
  }

  /* ── Glowing hearts row ── */
  .glow-hearts {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 36px;
  }
  .glow-hearts span {
    font-size: 1.5rem;
    filter: drop-shadow(0 0 8px rgba(255,77,126,0.8));
    animation: glowPulse 1.8s ease-in-out infinite;
  }
  .glow-hearts span:nth-child(2) { animation-delay: 0.3s; font-size:1.1rem; }
  .glow-hearts span:nth-child(3) { animation-delay: 0.6s; font-size:1.8rem; }
  .glow-hearts span:nth-child(4) { animation-delay: 0.9s; font-size:1.1rem; }
  .glow-hearts span:nth-child(5) { animation-delay: 1.2s; }
  @keyframes glowPulse {
    0%,100% { transform:scale(1);    filter:drop-shadow(0 0 6px  rgba(255,77,126,0.7)); }
    50%      { transform:scale(1.25); filter:drop-shadow(0 0 18px rgba(255,77,126,1)); }
  }

  /* ── Divider ── */
  .divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--blush), transparent);
    margin: 28px auto;
    border-radius: 2px;
  }

  /* ── Photo ── */
  .photo-wrap {
    position: relative;
    display: inline-block;
    margin: 22px auto 28px;
  }
  .shashu-photo {
    width: 160px;
    height: 200px;
    object-fit: cover;
    object-position: center 20%;
    border-radius: 50% / 40%;
    border: 4px solid rgba(255,255,255,0.9);
    box-shadow:
      0 0 0 3px var(--blush),
      0 0 24px rgba(255,77,126,0.5),
      0 8px 24px rgba(192,20,60,0.2);
    display: block;
    animation: photoFloat 3.5s ease-in-out infinite;
  }
  .photo-glow {
    position: absolute;
    inset: -8px;
    border-radius: 50% / 40%;
    background: radial-gradient(circle, rgba(255,77,126,0.25) 0%, transparent 70%);
    animation: glowBreath 3.5s ease-in-out infinite;
    z-index: -1;
  }
  @keyframes photoFloat {
    0%,100% { transform: translateY(0); }
    50%      { transform: translateY(-7px); }
  }
  @keyframes glowBreath {
    0%,100% { transform: scale(1);    opacity: 0.7; }
    50%      { transform: scale(1.15); opacity: 1; }
  }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .card { padding: 40px 24px 36px; }
    .btn-forgive { padding: 16px 32px; font-size: 1.3rem; }
  }
</style>
</head>

  <div class="typewriter-wrap">
    <p class="typewriter" id="typewriter" aria-live="polite"></p>
  </div>

  <div class="divider"></div>

  <div class="btn-wrap">
    <button class="btn-forgive" id="forgiveBtn" onclick="onForgive()" aria-label="Forgive Me">
      Forgive Me? 💖
    </button>
  </div>

  <p class="muahh" id="muahh" aria-live="assertive"></p>

  <div class="glow-hearts" aria-hidden="true">
    <span>💗</span><span>🌸</span><span>💕</span><span>🌷</span><span>💓</span>
  </div>
</div>

<script>
  // ── Typewriter ──
  const msg = "I'm really sorry... Please give me one more chance ❤️";
  const el  = document.getElementById('typewriter');
  let i = 0;

  // Cursor element
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  cursor.setAttribute('aria-hidden', 'true');

  function type() {
    if (i <= msg.length) {
      el.textContent = msg.slice(0, i);
      el.appendChild(cursor);
      i++;
      setTimeout(type, i === 1 ? 800 : 55 + Math.random() * 35);
    }
  }
  setTimeout(type, 1000);

  // ── Forgive handler ──
  let forgiven = false;
  function onForgive() {
    if (forgiven) return;
    forgiven = true;

    const btn   = document.getElementById('forgiveBtn');
    const muahh = document.getElementById('muahh');

    // Update button
    btn.textContent = 'Yay! Thank You ❤️';
    btn.classList.add('thanked');

    // Muahh message
    muahh.textContent = 'Muahhh 💋 Muahhh 💋 Muahhh 💋';
    requestAnimationFrame(() => requestAnimationFrame(() => muahh.classList.add('show')));

    // Heart burst from button
    heartBurst(btn);

    // Floating kisses
    for (let k = 0; k < 18; k++) {
      setTimeout(() => spawnKiss(), k * 130);
    }
  }

  function heartBurst(btn) {
    const rect   = btn.getBoundingClientRect();
    const cx     = rect.left + rect.width  / 2;
    const cy     = rect.top  + rect.height / 2;
    const emojis = ['❤️','💕','💗','💓','💖','🌸','💞'];

    for (let n = 0; n < 20; n++) {
      const span = document.createElement('span');
      span.className = 'burst-heart';
      span.textContent = emojis[Math.floor(Math.random() * emojis.length)];

      const angle = (n / 20) * 2 * Math.PI + Math.random() * 0.4;
      const dist  = 80 + Math.random() * 120;
      span.style.left = cx + 'px';
      span.style.top  = cy + 'px';
      span.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
      span.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
      span.style.animationDelay = Math.random() * 0.25 + 's';

      document.body.appendChild(span);
      span.addEventListener('animationend', () => span.remove());
    }
  }

  function spawnKiss() {
    const span = document.createElement('span');
    span.className = 'kiss-float';
    span.textContent = '💋';
    span.style.left = (8 + Math.random() * 84) + 'vw';
    span.style.top  = (20 + Math.random() * 60) + 'vh';
    span.style.fontSize = (1.4 + Math.random() * 1.4) + 'rem';
    span.style.animationDuration = (1.8 + Math.random() * 0.8) + 's';
    document.body.appendChild(span);
    span.addEventListener('animationend', () => span.remove());
  }
</script>
